<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANWIDEA EXPRESS</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    color: white;
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1601582589907-f92af5ed9db8');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero h1 {
    font-size: 38px;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.hero p {
    font-size: 18px;
    color: #ddd;
    margin-bottom: 30px;
}

.button {
    padding: 15px 40px;
    background: #ff6600;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 40px;
    transition: 0.3s;
}

.button:hover {
    background: white;
    color: #ff6600;
    transform: scale(1.1);
}

.section {
    background: #111;
    padding: 60px 20px;
    text-align: center;
}

.section h2 {
    margin-bottom: 30px;
}

.card-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 400px;
    margin: auto;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    background: #ff6600;
    transform: translateY(-5px);
}

footer {
    background: black;
    padding: 20px;
    text-align: center;
    color: #777;
}

</style>
</head>
<body>

<div class="hero">
    <h1>DEIN FIRMENNAME</h1>
    <p>Schnell • Sicher • Europaweit unterwegs</p>
    <a href="#" class="button">Jetzt Angebot anfragen</a>
</div>

<div class="section">
    <h2>Unsere Leistungen</h2>

    <div class="card-container">
        <div class="card">🚚 Express-Transporte</div>
        <div class="card">📦 Direktfahrten</div>
        <div class="card">🌍 Europaweite Lieferung</div>
        <div class="card">❄️ Temperaturgeführte Transporte</div>
    </div>
</div>

<footer>
    <p>© 2026 Dein Transportunternehmen</p>
</footer>

</body>
</html>
